<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Cristão — Namoro Santo</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 2rem; }
        .card-container { display: flex; justify-content: center; }
        .profile-card { background: white; width: 320px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .profile-card img { width: 100%; height: 300px; object-fit: cover; }
        .info { padding: 1.5rem; }
        .actions { display: flex; justify-content: space-around; padding: 1rem; border-top: 1px solid #eee; }
        .btn-like { background: #2ecc71; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 20px; cursor: pointer; }
        .btn-pass { background: #e74c3c; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 2rem;">Conexões em Destaque</h2>
    <div class="card-container">
        <div class="profile-card">
            <img src="https://via.placeholder.com/320x300" alt="Foto de Perfil">
            <div class="info">
                <h3>Maria Silva, 25</h3>
                <p style="color: #7f8c8d;">Igreja Batista — Rio de Janeiro</p>
                <p style="margin-top: 0.5rem;">"Buscando alguém para caminhar junto na fé e nos propósitos de Deus."</p>
            </div>
            <div class="actions">
                <button class="btn-pass">Passar</button>
                <button class="btn-like">Curtir</button>
            </div>
        </div>
    </div>
</body>
</html>
