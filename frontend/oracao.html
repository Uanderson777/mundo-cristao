<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Cristão — Mural de Oração</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 2rem; max-width: 800px; margin: 0 auto; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 2rem; }
        .prayer-card { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .prayer-card h4 { color: #3498db; margin-bottom: 0.5rem; }
        .btn-pray { background: #9b59b6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>
    <h2>Mural Comunidade de Oração</h2>
    <div class="prayer-card">
        <h4>Oração pela saúde da minha mãe</h4>
        <p>Peço intercessão dos irmãos pela recuperação da Sra. Ana no hospital.</p>
        <button class="btn-pray">🙏 Estou Orando (12)</button>
    </div>
</body>
</html>
